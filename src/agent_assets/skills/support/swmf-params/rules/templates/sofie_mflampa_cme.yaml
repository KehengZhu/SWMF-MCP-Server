# Template-pair manifest for the SOFIE+MFLAMPA CME archetype.
#
# Loaded by `swmf-replicate` after archetype detection on a CCMC SOFIE+MFLAMPA spec.

id: sofie_mflampa_cme_pair
case_archetype: sofie_mflampa_cme

start_template: SWMFSOLAR/Param/PARAM.in.sofie.CCMC
restart_template: SWMFSOLAR/Param/PARAM.in.sofie.MFLAMPA

required_flag_overrides:
  - target: config_pl_sc
    from: "u=Awsom"
    to: "u=AwsomR"
    why: "Spec implies AWSoM-R via 2-temperature SaMhd; the shipped template uses u=Awsom."
  - target: config_pl_ih
    from: "u=Awsom"
    to: "u=AwsomR"
    why: "IH must match SC variant for AWSoM-R coupling."

recipe: case_recipes/sofie_mflampa_cme.md

secondary_precedents:
  - SWMFSOLAR/Param/PARAM.in.sofie.CME
  - SWMFSOLAR/Param/PARAM.in.awsomr.CME
  - SWMFSOLAR/Run_Max_RP_CME3/run01/PARAM.in
  - examples/CCMC_run_weihao/Weihao_Liu_011326_SH_1_PARAM.expand.start
  - examples/CCMC_run_weihao/Weihao_Liu_011326_SH_1_PARAM.expand.restart

provenance: manifest
