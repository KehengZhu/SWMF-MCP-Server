# Defaults for CME eruption blocks. Apply at step 5 of the authoring ladder when neither
# spec nor derivation supplies the value. Tag as `provenance=default:<id>`.

- id: spheromak_shape_defaults
  applies_when:
    cme_block_type: SPHEROMAK
  defaults:
    "#CME.Stretch": 0.6
    "#CME.ApexHeight": 0.72
    "#CME.iHelicity": 1
    "#CME.DecayCme": -1
  assumptions:
    - "iHelicity=1 corresponds to right-handed FR; surface for confirmation if observation suggests otherwise."
    - "DecayCme=-1 disables the time-decay; the eruption is sustained over the seed window."
  evidence: "CCMC operational default; matches the weihao standard answer (PARAM.expand.restart)."

- id: cme_eruption_ops_guards
  applies_when:
    case_archetype: [sofie_mflampa_cme, awsom_cme_eruption]
  defaults:
    "#HELIOUPDATEB0.DtUpdateB0": 300
    "#CPUTIMEMAX.CpuTimeMax": "44 h"
  assumptions:
    - "DtUpdateB0=300 s keeps the rotating B0 fresh without dominating runtime."
  evidence: "Standard CME-run cadence in SWMFSOLAR templates and weihao standard answer."

- id: cme_eruption_couple_cadence
  applies_when:
    case_archetype: sofie_mflampa_cme
  defaults:
    "#COUPLE1.SC->SP.DtCouple": 120.0
    "#COUPLE1.IH->SP.DtCouple": 120.0
    "#COUPLE1.SC->IH.DnCouple": 1
  assumptions:
    - "120 s SC,IH→SP coupling is the CCMC standard for SOFIE+MFLAMPA SEP runs."
  evidence: "examples/CCMC_run_weihao restart: #COUPLE1 blocks."

- id: cme_savplot_lasco_set
  applies_when:
    quicklook_target_present: lasco_c2_brightness
  defaults:
    "#SAVEPLOT.entry": "los ins idl_ascii soho:c2"
  evidence: "Recipe-driven mapping in case_recipes/sofie_mflampa_cme.md."
